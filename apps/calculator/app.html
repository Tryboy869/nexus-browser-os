<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculatrice</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: rgba(20, 20, 30, 0.95);
      color: #e8e8f0;
      padding: 20px;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .calculator {
      max-width: 400px;
      width: 100%;
    }

    .display {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: right;
    }

    .expression {
      font-size: 14px;
      color: #9090a8;
      min-height: 20px;
      margin-bottom: 8px;
      word-wrap: break-word;
    }

    .result {
      font-size: 36px;
      font-weight: 600;
      color: #667eea;
      word-wrap: break-word;
      min-height: 50px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 20px;
      font-size: 18px;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: #e8e8f0;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
      background: rgba(255, 255, 255, 0.15);
    }

    button.operator {
      background: rgba(102, 126, 234, 0.2);
      color: #667eea;
    }

    button.operator:hover {
      background: rgba(102, 126, 234, 0.3);
    }

    button.equals {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      grid-column: span 2;
    }

    button.equals:hover {
      opacity: 0.9;
    }

    button.clear {
      background: rgba(255, 85, 85, 0.2);
      color: #ff5555;
      grid-column: span 2;
    }

    button.clear:hover {
      background: rgba(255, 85, 85, 0.3);
    }

    button.zero {
      grid-column: span 2;
    }

    .history {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      max-height: 150px;
      overflow-y: auto;
    }

    .history-title {
      font-size: 12px;
      color: #9090a8;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .history-item {
      font-size: 13px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      cursor: pointer;
      transition: background 0.2s;
    }

    .history-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .history-item:last-child {
      border-bottom: none;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression">&nbsp;</div>
      <div class="result" id="result">0</div>
    </div>

    <div class="buttons">
      <button class="clear">C</button>
      <button class="operator">(</button>
      <button class="operator">)</button>
      <button class="operator">÷</button>
      
      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button class="operator">×</button>
      
      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button class="operator">−</button>
      
      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button class="operator">+</button>
      
      <button class="zero">0</button>
      <button>.</button>
      <button class="operator">x²</button>
      
      <button class="equals">=</button>
      <button class="operator">√</button>
    </div>

    <div class="history">
      <div class="history-title">Historique</div>
      <div id="history"></div>
    </div>
  </div>

  <script>
    class Calculator {
      constructor() {
        this.expression = '';
        this.result = '0';
        this.history = [];
        this.loadHistory();
        this.setupEventListeners();
      }

      setupEventListeners() {
        // Get all buttons
        const buttons = document.querySelectorAll('button');
        
        buttons.forEach(button => {
          button.addEventListener('click', () => {
            const text = button.textContent.trim();
            
            if (button.classList.contains('clear')) {
              this.clear();
            } else if (button.classList.contains('equals')) {
              this.calculate();
            } else if (text === '√') {
              this.sqrt();
            } else if (text === 'x²') {
              this.power2();
            } else if (text === '÷') {
              this.input('/');
            } else if (text === '×') {
              this.input('*');
            } else if (text === '−') {
              this.input('-');
            } else {
              this.input(text);
            }
          });
        });
      }

      input(value) {
        this.expression += value;
        this.updateDisplay();
      }

      clear() {
        this.expression = '';
        this.result = '0';
        this.updateDisplay();
      }

      sqrt() {
        if (this.expression) {
          try {
            const value = eval(this.expression);
            this.result = String(Math.sqrt(value));
            this.addToHistory(this.expression, `√(${this.expression}) = ${this.result}`);
            this.expression = '';
            this.updateDisplay();
          } catch (error) {
            this.result = 'Erreur';
            this.updateDisplay();
          }
        } else if (this.result !== '0' && this.result !== 'Erreur') {
          const value = parseFloat(this.result);
          this.result = String(Math.sqrt(value));
          this.addToHistory(this.expression, `√(${value}) = ${this.result}`);
          this.updateDisplay();
        }
      }

      power2() {
        if (this.expression) {
          this.expression += '**2';
          this.updateDisplay();
        } else if (this.result !== '0' && this.result !== 'Erreur') {
          this.expression = this.result + '**2';
          this.updateDisplay();
        }
      }

      calculate() {
        if (!this.expression) return;

        try {
          // Safe eval for simple math
          const sanitized = this.expression
            .replace(/[^0-9+\-*/.()]/g, '')
            .replace(/\*\*/g, '^');
          
          // Use Function instead of eval for safety
          const result = new Function('return ' + this.expression)();
          
          this.result = String(result);
          this.addToHistory(this.expression, this.result);
          this.expression = '';
          
        } catch (error) {
          this.result = 'Erreur';
          console.error('Calculation error:', error);
        }

        this.updateDisplay();
      }

      addToHistory(expr, result) {
        this.history.unshift({
          expression: expr,
          result: result,
          timestamp: new Date().toLocaleTimeString()
        });

        // Keep only last 10
        if (this.history.length > 10) {
          this.history.pop();
        }

        this.saveHistory();
        this.updateHistory();
      }

      updateDisplay() {
        const exprEl = document.getElementById('expression');
        const resultEl = document.getElementById('result');
        
        exprEl.textContent = this.expression || '\u00A0';
        resultEl.textContent = this.result;
      }

      updateHistory() {
        const historyEl = document.getElementById('history');
        
        if (this.history.length === 0) {
          historyEl.innerHTML = '<div style="color: #9090a8; font-size: 12px;">Aucun calcul</div>';
          return;
        }

        historyEl.innerHTML = this.history.map((item, index) => `
          <div class="history-item" onclick="calc.loadFromHistory(${index})">
            <div style="color: #9090a8;">${item.expression}</div>
            <div style="color: #667eea; font-weight: 600;">= ${item.result}</div>
          </div>
        `).join('');
      }

      loadFromHistory(index) {
        const item = this.history[index];
        if (item) {
          this.expression = item.expression;
          this.result = item.result;
          this.updateDisplay();
        }
      }

      saveHistory() {
        try {
          localStorage.setItem('nexus_calculator_history', JSON.stringify(this.history));
        } catch (error) {
          console.error('Failed to save history:', error);
        }
      }

      loadHistory() {
        try {
          const saved = localStorage.getItem('nexus_calculator_history');
          if (saved) {
            this.history = JSON.parse(saved);
            this.updateHistory();
          }
        } catch (error) {
          console.error('Failed to load history:', error);
        }
      }
    }

    // Initialize calculator
    const calc = new Calculator();

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') {
        calc.input(e.key);
      } else if (['+', '-', '*', '/', '.', '(', ')'].includes(e.key)) {
        calc.input(e.key);
      } else if (e.key === 'Enter') {
        calc.calculate();
      } else if (e.key === 'Escape' || e.key === 'c') {
        calc.clear();
      } else if (e.key === 'Backspace') {
        calc.expression = calc.expression.slice(0, -1);
        calc.updateDisplay();
      }
    });

    // Notify parent that app is ready
    console.log('[Calculator] Initialized');
  </script>
</body>
</html>
