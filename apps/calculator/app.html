<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculatrice</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: rgba(20, 20, 30, 0.95);
      color: #e8e8f0;
      padding: 20px;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .calculator {
      max-width: 400px;
      width: 100%;
    }

    .display {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: right;
    }

    .expression {
      font-size: 14px;
      color: #9090a8;
      min-height: 20px;
      margin-bottom: 8px;
    }

    .result {
      font-size: 36px;
      font-weight: 600;
      color: #667eea;
      word-wrap: break-word;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 20px;
      font-size: 18px;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: #e8e8f0;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    button.operator {
      background: rgba(102, 126, 234, 0.2);
      color: #667eea;
    }

    button.operator:hover {
      background: rgba(102, 126, 234, 0.3);
    }

    button.equals {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      grid-column: span 2;
    }

    button.equals:hover {
      opacity: 0.9;
    }

    button.clear {
      background: rgba(255, 85, 85, 0.2);
      color: #ff5555;
      grid-column: span 2;
    }

    button.clear:hover {
      background: rgba(255, 85, 85, 0.3);
    }

    button.zero {
      grid-column: span 2;
    }

    .history {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      max-height: 150px;
      overflow-y: auto;
    }

    .history-title {
      font-size: 12px;
      color: #9090a8;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .history-item {
      font-size: 13px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .history-item:last-child {
      border-bottom: none;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <div class="buttons">
      <button class="clear" onclick="calc.clear()">C</button>
      <button class="operator" onclick="calc.input('(')">(</button>
      <button class="operator" onclick="calc.input(')')">)</button>
      
      <button onclick="calc.input('7')">7</button>
      <button onclick="calc.input('8')">8</button>
      <button onclick="calc.input('9')">9</button>
      <button class="operator" onclick="calc.input('/')">÷</button>
      
      <button onclick="calc.input('4')">4</button>
      <button onclick="calc.input('5')">5</button>
      <button onclick="calc.input('6')">6</button>
      <button class="operator" onclick="calc.input('*')">×</button>
      
      <button onclick="calc.input('1')">1</button>
      <button onclick="calc.input('2')">2</button>
      <button onclick="calc.input('3')">3</button>
      <button class="operator" onclick="calc.input('-')">−</button>
      
      <button class="zero" onclick="calc.input('0')">0</button>
      <button onclick="calc.input('.')">.</button>
      <button class="operator" onclick="calc.input('+')">+</button>
      
      <button class="equals" onclick="calc.calculate()">=</button>
      <button class="operator" onclick="calc.input('**')">x²</button>
      <button class="operator" onclick="calc.sqrt()">√</button>
    </div>

    <div class="history">
      <div class="history-title">Historique</div>
      <div id="history"></div>
    </div>
  </div>

  <script>
    class Calculator {
      constructor() {
        this.expression = '';
        this.result = '0';
        this.history = [];
        this.loadHistory();
      }

      input(value) {
        this.expression += value;
        this.updateDisplay();
      }

      clear() {
        this.expression = '';
        this.result = '0';
        this.updateDisplay();
      }

      sqrt() {
        if (this.expression) {
          this.expression = `Math.sqrt(${this.expression})`;
          this.calculate();
        }
      }

      async calculate() {
        if (!this.expression) return;

        try {
          // Use CPU Manager if available
          if (window.parent && window.parent.BrowserOS && window.parent.BrowserOS.cpuManager) {
            // Check if it's a simple operation or complex
            const isSimple = /^[\d\.\+\-\*\/\(\)\s]+$/.test(this.expression);
            
            if (isSimple) {
              // Evaluate directly
              this.result = String(eval(this.expression));
            } else {
              // Use CPU manager for complex operations
              const operation = this.detectOperation();
              if (operation) {
                this.result = String(await window.parent.BrowserOS.cpuManager.execute(operation.name, ...operation.args));
              } else {
                this.result = String(eval(this.expression));
              }
            }
          } else {
            // Fallback to eval
            this.result = String(eval(this.expression));
          }

          // Add to history
          this.history.unshift({
            expression: this.expression,
            result: this.result,
            timestamp: new Date().toLocaleTimeString()
          });

          // Keep only last 10
          if (this.history.length > 10) {
            this.history.pop();
          }

          this.saveHistory();
          this.updateHistory();

          // Clear expression but keep result
          this.expression = '';
          
        } catch (error) {
          this.result = 'Erreur';
          console.error('Calculation error:', error);
        }

        this.updateDisplay();
      }

      detectOperation() {
        // Detect special operations for CPU manager
        if (this.expression.includes('Math.sqrt')) {
          const match = this.expression.match(/Math\.sqrt\(([\d\.]+)\)/);
          if (match) {
            return { name: 'sqrt', args: [parseFloat(match[1])] };
          }
        }

        if (this.expression.includes('**')) {
          const parts = this.expression.split('**');
          if (parts.length === 2) {
            return { name: 'power', args: [parseFloat(parts[0]), parseFloat(parts[1])] };
          }
        }

        return null;
      }

      updateDisplay() {
        document.getElementById('expression').textContent = this.expression || ' ';
        document.getElementById('result').textContent = this.result;
      }

      updateHistory() {
        const historyEl = document.getElementById('history');
        
        if (this.history.length === 0) {
          historyEl.innerHTML = '<div style="color: #9090a8; font-size: 12px;">Aucun calcul</div>';
          return;
        }

        historyEl.innerHTML = this.history.map(item => `
          <div class="history-item">
            <div style="color: #9090a8;">${item.expression}</div>
            <div style="color: #667eea; font-weight: 600;">= ${item.result}</div>
          </div>
        `).join('');
      }

      saveHistory() {
        localStorage.setItem('calculator_history', JSON.stringify(this.history));
      }

      loadHistory() {
        try {
          const saved = localStorage.getItem('calculator_history');
          if (saved) {
            this.history = JSON.parse(saved);
            this.updateHistory();
          }
        } catch (error) {
          console.error('Failed to load history:', error);
        }
      }
    }

    // Initialize calculator
    const calc = new Calculator();

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') {
        calc.input(e.key);
      } else if (['+', '-', '*', '/', '.', '(', ')'].includes(e.key)) {
        calc.input(e.key);
      } else if (e.key === 'Enter') {
        calc.calculate();
      } else if (e.key === 'Escape' || e.key === 'c') {
        calc.clear();
      } else if (e.key === 'Backspace') {
        calc.expression = calc.expression.slice(0, -1);
        calc.updateDisplay();
      }
    });

    // Notify parent that app is ready
    if (window.parent && window.parent.BrowserOS) {
      console.log('[Calculator] App ready');
    }
  </script>
</body>
</html>
